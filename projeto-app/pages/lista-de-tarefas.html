<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM Task Core - Minhas Tarefas</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="app-container">

    <!-- ================= SIDEBAR (DESKTOP) ================= -->
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="logo-box">✓</div>
          <div class="brand-text">
            <h1>VM Task Core</h1>
            <span>COMMAND & CONTROL</span>
          </div>
        </div>

        <nav class="nav-links">
          <span style="font-family: var(--font-mono); font-size: 8px; font-weight: bold; color: var(--color-text-secondary); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.1em; opacity: 0.7;">
            Navegação
          </span>
          <a href="#" class="nav-item active">
            <span>Minhas Tarefas</span>
            <span class="badge" style="display: none;">0</span>
          </a>
          <a href="./nova-tarefa.html" class="nav-item">
            <span>Criar Tarefa</span>
          </a>
        </nav>
      </div>

      <div style="background: rgba(87, 63, 108, 0.15); border: 1px solid var(--color-surface); padding: 12px; border-radius: var(--rounded-lg); display: flex; align-items: center; gap: 8px;">
        <div style="width: 24px; height: 24px; border-radius: 50%; background: var(--color-surface); font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: var(--color-primary);">VM</div>
        <div style="overflow: hidden;">
          <p style="font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Mauro Acmaúes</p>
          <span style="font-family: var(--font-mono); font-size: 8px; color: var(--color-text-secondary);">prod-core</span>
        </div>
      </div>
    </aside>

    <!-- ================= HEADER (MOBILE) ================= -->
    <header class="mobile-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="logo-box" style="width: 28px; height: 28px; font-size: 13px;">✓</div>
        <div class="brand-text">
          <h1 style="font-size: 13px;">VM Task Core</h1>
          <span style="font-size: 7px; opacity: 0.8;">MOBILE WORKSPACE</span>
        </div>
      </div>
      <span class="badge" style="display: none;">0</span>
    </header>

    <!-- ================= CONTEÚDO PRINCIPAL ================= -->
    <main class="main-content">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
        <div>
          <h2 style="font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--color-text);">
            Lista de Tarefas
          </h2>
          <p style="font-size: 13px; color: var(--color-text-secondary); margin-top: 4px;">
            Gerencie suas obrigações e metas de alta produtividade.
          </p>
        </div>
        <a href="./nova-tarefa.html" class="btn btn-primary" style="font-size: 12px; padding: 8px 12px;">
          + Nova Tarefa
        </a>
      </div>

      <!-- Painel de Filtros e Busca -->
      <div class="filters-panel">
        <div class="search-container">
          <input type="text" id="search-input" class="search-input" placeholder="Buscar tarefas por título...">
        </div>
        
        <div class="dropdown-filters">
          <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <div class="filter-group">
              <span>Prioridade:</span>
              <select class="filter-select" id="priority-filter">
                <option value="all">Todas</option>
                <option value="high">Alta</option>
                <option value="medium">Média</option>
                <option value="low">Baixa</option>
              </select>
            </div>

            <div class="filter-group">
              <span>Categoria:</span>
              <select class="filter-select" id="category-filter">
                <option value="all">Todas</option>
              </select>
            </div>
          </div>

          <div class="filter-group">
            <span>Ordenar por:</span>
            <select class="filter-select" id="sort-select">
              <option value="date">Prazo</option>
              <option value="recent">Recentes</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Container de Renderização das Tarefas -->
      <div id="tasks-container" class="tasks-list">
        <!-- Renderizado dinamicamente via script.js -->
      </div>
    </main>

    <!-- ================= BOTTOM NAVIGATION (MOBILE) ================= -->
    <nav class="mobile-nav">
      <a href="#" class="mobile-nav-item active">
        <span>📋</span>
        <span>Tarefas</span>
      </a>
      <a href="./nova-tarefa.html" class="mobile-nav-item">
        <span>➕</span>
        <span>Adicionar</span>
      </a>
    </nav>

  </div>

  <script src="../script.js"></script>
</body>
</html>
